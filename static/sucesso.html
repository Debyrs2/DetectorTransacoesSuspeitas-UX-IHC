<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataGuard - Status</title>
    <style>
        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #0f172a;
            font-family: system-ui, sans-serif;
            color: white;
        }

        .card {
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
        }

        .icon {
            background: #10b981;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 20px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 24px;
        }

        p {
            color: #94a3b8;
            margin: 0 0 30px;
            line-height: 1.5;
        }

        .btn {
            background: #6366f1;
            color: white;
            padding: 14px 24px;
            border-radius: 8px;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon">✓</div>
        <h1 id="title">Acesso Liberado!</h1>
        <p id="msg">Processando...</p>
        <a href="index.html" class="btn" id="btn">Ir para o Sistema</a>
    </div>
    <script>
        const lang = localStorage.getItem('app-lang') || 'pt';
        fetch(`idiomas/${lang}.json`)
            .then(r => r.json())
            .then(dict => {
                document.getElementById('title').textContent = dict.successTitle || "Acesso Liberado!";
                document.getElementById('msg').textContent = dict.successMsg || "";
                document.getElementById('btn').textContent = dict.btnGoToSystem || "Entrar";
            });
    </script>
</body>

</html>
