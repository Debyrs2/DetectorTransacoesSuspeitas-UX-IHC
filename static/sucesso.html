<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataGuard - Status</title>
    <style>
        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #0f172a;
            font-family: system-ui, sans-serif;
            color: white;
        }

        .card {
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 90%;
        }

        .icon {
            background: #10b981;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 20px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 24px;
        }

        p {
            color: #94a3b8;
            margin: 0 0 30px;
            line-height: 1.5;
        }

        .btn {
            background: #6366f1;
            color: white;
            padding: 14px 24px;
            border-radius: 8px;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 20px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #4f46e5;
        }

        .lang-selector select {
            background: transparent;
            color: #94a3b8;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 6px 12px;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        .lang-selector select:focus {
            border-color: #6366f1;
        }

        .lang-selector select option {
            background: #1e293b;
            color: white;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon">✓</div>
        <h1 id="title">Acesso Liberado!</h1>
        <p id="msg">Processando...</p>
        <a href="index.html" class="btn" id="btn">Ir para o Sistema</a>

        <div class="lang-selector">
            <select id="langSelect" aria-label="Alterar idioma">
                <option value="pt">🇧🇷 PT</option>
                <option value="en">🇺🇸 EN</option>
                <option value="es">🇪🇸 ES</option>
            </select>
        </div>
    </div>

    <script>
        const langSelect = document.getElementById('langSelect');

        // Função que isola a lógica de buscar e aplicar os textos
        function carregarIdioma(lang) {
            document.documentElement.lang = lang === 'en' ? 'en-US' : (lang === 'es' ? 'es-ES' : 'pt-BR');

            fetch(`idiomas/${lang}.json`)
                .then(r => {
                    if (!r.ok) throw new Error("Falha ao carregar arquivo de idioma.");
                    return r.json();
                })
                .then(dict => {
                    document.title = dict.successTitle ? `DataGuard - ${dict.successTitle}` : "DataGuard";
                    document.getElementById('title').textContent = dict.successTitle || "Acesso Liberado!";
                    document.getElementById('msg').textContent = dict.successMsg || "Seu e-mail foi confirmado com sucesso. Sua conta do DataGuard já está ativa.";
                    document.getElementById('btn').textContent = dict.btnGoToSystem || "Ir para o Sistema";
                })
                .catch(err => {
                    // Fallback de segurança caso a rede falhe
                    console.error("Erro ao carregar tradução:", err);
                    document.title = "DataGuard - Acesso Liberado";
                    document.getElementById('title').textContent = "Acesso Liberado!";
                    document.getElementById('msg').textContent = "Seu e-mail foi confirmado com sucesso. Sua conta do DataGuard já está ativa.";
                    document.getElementById('btn').textContent = "Ir para o Sistema";
                });
        }

        // Setup Inicial
        let currentLang = localStorage.getItem('app-lang') || 'pt';
        langSelect.value = currentLang;
        carregarIdioma(currentLang);

        // Ouve quando o usuário troca o idioma no select
        langSelect.addEventListener('change', (e) => {
            currentLang = e.target.value;
            localStorage.setItem('app-lang', currentLang);
            carregarIdioma(currentLang);
        });
    </script>
</body>

</html>
